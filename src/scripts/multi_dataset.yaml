epochs: 100
batch: 16
imgsz: 768
patience: 25
workers: 8
optimizer: AdamW
lr0: 0.003
lrf: 0.01
weight_decay: 0.0005
warmup_epochs: 3.0
cos_lr: true
close_mosaic: 10

# Mobile/phone-oriented augmentation
hsv_h: 0.02
hsv_s: 0.7
hsv_v: 0.5
degrees: 12.0
translate: 0.12
scale: 0.6
shear: 2.0
perspective: 0.001
flipud: 0.0
fliplr: 0.5
mosaic: 0.8
mixup: 0.1

# Keep rectangular batching off for stronger shape/aspect randomization during training
rect: false
