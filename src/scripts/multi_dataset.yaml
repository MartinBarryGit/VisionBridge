# YOLO Training Configuration with Data Augmentation
# This file contains comprehensive training settings for door detection

# Model settings
model: 'pretrained.pt'  # or 'yolov8s.pt', 'yolov8m.pt', 'yolov8l.pt', 'yolov8x.pt'

# Training hyperparameters
epochs: 50
batch: 10

save_period: 10  # Save checkpoint every 10 epochs
patience: 50     # Early stopping patience
workers: 8       # Number of dataloader workers
device: 0        # GPU device (0 for first GPU, 'cpu' for CPU)

# Optimizer settings
optimizer: 'SGD'  # SGD, Adam, AdamW, NAdam, RAdam, RMSProp
lr0: 0.01         # Initial learning rate
lrf: 0.01         # Final learning rate (lr0 * lrf)
momentum: 0.937   # SGD momentum/Adam beta1
weight_decay: 0.0005  # Optimizer weight decay
warmup_epochs: 3.0    # Warmup epochs
warmup_momentum: 0.8  # Warmup initial momentum
warmup_bias_lr: 0.1   # Warmup initial bias lr

# Loss function weights
box: 7.5          # Box loss ga
cls: 0.5          # Class loss gain
dfl: 1.5          # DFL loss gain

# Data augmentation settings
hsv_h: 0.015      # Image HSV-Hue augmentation (fraction)
hsv_s: 0.7        # Image HSV-Saturation augmentation (fraction)
hsv_v: 0.4        # Image HSV-Value augmentation (fraction)
degrees: 90     # Image rotation (+/- deg)
translate: 0.5    # Image translation (+/- fraction)
scale: 2        # Image scale (+/- gain)
shear: 50        # Image shear (+/- deg)
perspective: .5  # Image perspective (+/- fraction)
flipud: 0.1       # Image flip up-down (probability)
fliplr: 0.5       # Image flip left-right (probability)
mosaic: 1.0       # Image mosaic (probability)
mixup: 0.0        # Image mixup (probability)
copy_paste: 0.0   # Segment copy-paste (probability)

# Advanced augmentation
erasing: 0.4      # Random erasing probability
crop_fraction: 1.0 # Image crop fraction

# Validation settings
val: True         # Validate/test during training
split: val        # Dataset split to use for validation
save_json: False  # Save results to JSON file
save_hybrid: False # Save hybrid version of labels
conf: 0.001       # Object confidence threshold for detection
iou: 0.6          # Intersection over union (IoU) threshold for NMS
max_det: 300      # Maximum number of detections per image
half: False       # Use half precision (FP16)
dnn: False        # Use OpenCV DNN for ONNX inference

# Logging and visualization
plots: True       # Save training plots
verbose: True     # Verbose output
save: True        # Save checkpoints
save_txt: False   # Save results as .txt file
save_conf: False  # Save confidences in labels
save_crop: False  # Save cropped images with results

# Project settings
project: 'runs/detect'  # Project directory
name: 'multi_dataset'  # Experiment name
exist_ok: False         # Overwrite existing experiment
pretrained: True        # Use pretrained model
resume: False           # Resume training from last checkpoint
cache: False            # Cache images for faster training
rect: False             # Rectangular training
cos_lr: True           # Cosine LR scheduler
close_mosaic: 10        # Disable mosaic augmentation for final epochs
amp: True               # Automatic Mixed Precision training
fraction: 1.0           # Dataset fraction to train on
profile: False          # Profile ONNX and TensorRT speeds
freeze: None            # Freeze layers: backbone=10, first3=0 1 2
multi_scale: False      # Multi-scale training
overlap_mask: True      # Overlap masks during training
mask_ratio: 4           # Mask downsample ratio
dropout: 0.1            # Use dropout regularization
